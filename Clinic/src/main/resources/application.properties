spring.application.name=Clinic

# PostgreSQL - Use 127.0.0.1 instead of localhost to bypass slow Windows IPv6 DNS lookups
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/clinic_flow
spring.datasource.username=postgres
spring.datasource.password=Tamanna@2006
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080

# Performance Optimizations for Local Development
spring.main.lazy-initialization=true

# Disable Open-In-View pattern to avoid startup warnings and save DB connection resources
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=clinic-flow-secret-key-must-be-at-least-256-bits-long-for-hmac-sha-algorithm-2026
jwt.expiration-ms=86400000

# Google Calendar Integration
# To enable Google Calendar sync:
# 1. Go to https://console.cloud.google.com/apis/credentials
# 2. Create an OAuth 2.0 Client ID for a Desktop App
# 3. Download the JSON credentials file
# 4. Set the path to the downloaded file below
# google.calendar.credentials.file.path=C:/path/to/your/credentials.json
google.calendar.credentials.file.path=

google.calendar.application.name=ClinicFlow
