spring.application.name=Clinic

# PostgreSQL - Use 127.0.0.1 instead of localhost to bypass slow Windows IPv6 DNS lookups
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/clinic_flow
spring.datasource.username=postgres
spring.datasource.password=Tamanna@2006
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Removed obsolete hibernate.dialect setting since Spring Boot / Hibernate 7 detects it automatically

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080

# Performance Optimizations for Local Development
# Enable lazy bean initialization to dramatically speed up startup time
spring.main.lazy-initialization=true

# Disable Open-In-View pattern to avoid startup warnings and save DB connection resources
spring.jpa.open-in-view=false


